<svg viewBox="0 0 435 466" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <rect width="435" height="466" fill="#000"/>
  <defs>
    <linearGradient id="owl-orange-light" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#E8621A;stop-opacity:0.45"/>
      <stop offset="20%" style="stop-color:#f08a4a;stop-opacity:0.25"/>
      <stop offset="45%" style="stop-color:#ffd4b8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
    </linearGradient>
    <!-- 提亮猫头鹰，使深灰在黑色背景上可见 -->
    <filter id="owl-brighten" x="0" y="0">
      <feColorMatrix in="SourceGraphic" type="matrix"
        values="2.2 0 0 0 0  0 2.2 0 0 0  0 0 2.2 0 0  0 0 0 1 0"/>
    </filter>
  </defs>
  <g filter="url(#owl-brighten)">
    <image href="/owl-transparent.png" x="0" y="0" width="435" height="466" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <rect x="0" y="0" width="435" height="466" fill="url(#owl-orange-light)" style="mix-blend-mode: overlay"/>
</svg>
